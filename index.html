<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GENOMON — ศึกนักเพาะพันธุ์แห่งยีน | สอบกลางภาค วิทยาศาสตร์ ม.3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Sarabun:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0E0B1F;      /* พื้นห้องฟักไข่ */
  --shell:#191238;     /* แผงเปลือกไข่ */
  --shell2:#221944;
  --membrane:#3A2C7A;  /* เยื่อหุ้ม / เส้นขอบ */
  --yolk:#FFC24B;      /* ไข่แดง = ปุ่มหลัก/เวลา */
  --jade:#4BE0A8;      /* อัลลีลเด่น = สำเร็จ */
  --rose:#FF5D8F;      /* อัลลีลด้อย = เตือน/กลายพันธุ์ */
  --cyan:#5AD8FF;
  --ink:#EDEAFB;
  --mist:#A79FD6;
  --r:14px;
  --shadow:0 18px 40px -18px rgba(0,0,0,.75);
  --dsp:'Kanit','Noto Sans Thai','Leelawadee UI',Tahoma,sans-serif;
  --body:'Sarabun','Noto Sans Thai','Leelawadee UI',Tahoma,sans-serif;
  --mono:'IBM Plex Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(1100px 700px at 12% -10%, #2A1F5E 0%, transparent 55%),
    radial-gradient(900px 600px at 95% 0%, #123B4D 0%, transparent 50%),
    var(--void);
  background-attachment:fixed;
  color:var(--ink);
  font-family:var(--body);
  font-size:16px;
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* ตารางพันเนตต์เป็นลายพื้นหลัง = โมทีฟหลักของเกม */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.05;
  background-image:linear-gradient(var(--mist) 1px,transparent 1px),linear-gradient(90deg,var(--mist) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
  -webkit-mask-image:radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
}
#app{position:relative;z-index:1;min-height:100%}
h1,h2,h3,h4{font-family:var(--dsp);font-weight:600;line-height:1.35;letter-spacing:.2px}
button{font-family:var(--dsp);cursor:pointer;border:0}
input,textarea,select{font-family:var(--body);font-size:1rem}
:focus-visible{outline:3px solid var(--yolk);outline-offset:2px;border-radius:6px}

.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 90px}
.narrow{max-width:660px}

/* ---------- ปุ่ม ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg,#FFD37A,var(--yolk));color:#2A1A00;
  font-weight:700;font-size:1.02rem;padding:13px 24px;border-radius:12px;
  box-shadow:0 6px 0 #B67F13, 0 14px 26px -12px rgba(255,194,75,.7);
  transition:transform .08s ease, box-shadow .08s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #B67F13}
.btn[disabled]{opacity:.45;cursor:not-allowed;box-shadow:0 6px 0 #6b6b6b}
.btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--membrane);box-shadow:none;font-weight:500}
.btn.ghost:hover{border-color:var(--yolk);color:var(--yolk)}
.btn.ghost:active{transform:none}
.btn.jade{background:linear-gradient(180deg,#7FF3C6,var(--jade));color:#02291C;box-shadow:0 6px 0 #2A9A72}
.btn.jade:active{box-shadow:0 2px 0 #2A9A72}
.btn.sm{padding:8px 14px;font-size:.9rem;box-shadow:none;border-radius:10px}
.btn.block{width:100%}

/* ---------- แผง ---------- */
.card{
  background:linear-gradient(180deg,var(--shell2),var(--shell));
  border:1px solid var(--membrane);border-radius:var(--r);
  box-shadow:var(--shadow);padding:22px;
}
.eyebrow{
  font-family:var(--mono);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--mist);display:block;margin-bottom:6px;
}
.muted{color:var(--mist)}
.mono{font-family:var(--mono)}

/* ---------- หน้าลงทะเบียน ---------- */
.hero{text-align:center;padding:38px 0 10px}
.logo{
  font-family:var(--dsp);font-weight:700;font-size:clamp(2.4rem,7vw,4rem);line-height:1;
  background:linear-gradient(100deg,var(--jade),var(--cyan) 40%,var(--yolk) 75%,var(--rose));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:2px;
}
.tagline{font-family:var(--dsp);color:var(--ink);font-size:1.05rem;margin-top:2px}
.sub{color:var(--mist);font-size:.95rem;margin-top:6px}

.field{margin-bottom:14px}
.field label{display:block;font-family:var(--dsp);font-size:.9rem;color:var(--mist);margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;background:#120E2B;color:var(--ink);
  border:1.5px solid var(--membrane);border-radius:10px;padding:12px 14px;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--yolk);outline:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.err{color:var(--rose);font-size:.88rem;margin-top:8px;min-height:20px}

.rules{list-style:none;display:grid;gap:8px;margin-top:6px}
.rules li{display:flex;gap:10px;align-items:flex-start;font-size:.95rem;color:var(--ink)}
.rules li b{color:var(--yolk)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--jade);flex:0 0 8px;margin-top:9px}

/* ---------- เลือกไข่ ---------- */
.eggs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}
.egg{
  background:var(--shell);border:2px solid var(--membrane);border-radius:16px;
  padding:16px 10px;text-align:center;transition:.18s;color:var(--ink);
}
.egg:hover{transform:translateY(-4px);border-color:var(--yolk)}
.egg.on{border-color:var(--yolk);background:#2A2050;box-shadow:0 0 0 3px rgba(255,194,75,.22)}
.egg .nm{font-family:var(--dsp);font-weight:600;margin-top:6px}
.egg .ds{font-size:.8rem;color:var(--mist);line-height:1.5}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.float{animation:bob 3.2s ease-in-out infinite}
@keyframes shakeEgg{0%,100%{transform:rotate(0)}20%{transform:rotate(-7deg)}40%{transform:rotate(6deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(3deg)}}
.hatching{animation:shakeEgg .5s ease-in-out 6}
@keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.pop{animation:popIn .55s cubic-bezier(.2,1.5,.4,1)}
@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.flash{position:fixed;inset:0;background:#fff;z-index:99;animation:flash .5s ease-out forwards;pointer-events:none}

/* ---------- HUD ---------- */
.hud{
  position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
  background:rgba(14,11,31,.86);border-bottom:1px solid var(--membrane);
}
.hud-in{max-width:1100px;margin:0 auto;padding:9px 18px;display:flex;align-items:center;gap:14px}
.hud .who{font-family:var(--dsp);font-size:.92rem;line-height:1.25;min-width:0}
.hud .who small{display:block;color:var(--mist);font-size:.75rem;font-family:var(--mono)}
.spacer{flex:1}
.timer{
  font-family:var(--mono);font-weight:600;font-size:1.3rem;color:var(--yolk);
  background:#120E2B;border:1.5px solid var(--membrane);border-radius:10px;padding:4px 12px;letter-spacing:1px;
}
.timer.warn{color:#FFB020;border-color:#FFB020}
.timer.crit{color:var(--rose);border-color:var(--rose);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
.pips{display:flex;gap:6px}
.pip{width:11px;height:11px;border-radius:3px;background:var(--membrane);transform:rotate(45deg)}
.pip.done{background:var(--jade)}
.pip.now{background:var(--yolk);box-shadow:0 0 10px var(--yolk)}

/* ---------- แผนที่ ---------- */
.route{display:grid;gap:12px;margin-top:14px}
.node{
  display:grid;grid-template-columns:56px 1fr auto;gap:14px;align-items:center;
  background:linear-gradient(180deg,var(--shell2),var(--shell));
  border:1.5px solid var(--membrane);border-left:5px solid var(--membrane);
  border-radius:12px;padding:12px 16px;text-align:left;width:100%;color:var(--ink);
  transition:.15s;
}
.node:hover:not(:disabled){border-left-color:var(--yolk);transform:translateX(3px)}
.node:disabled{opacity:.42;cursor:not-allowed}
.node.done{border-left-color:var(--jade)}
.node.now{border-left-color:var(--yolk);box-shadow:0 0 0 2px rgba(255,194,75,.2)}
.node .zn{font-family:var(--dsp);font-weight:600;font-size:1.05rem}
.node .zs{font-size:.83rem;color:var(--mist)}
.node .badge{font-family:var(--mono);font-size:.75rem;color:var(--void);background:var(--jade);padding:3px 9px;border-radius:20px;font-weight:600}
.node .badge.wait{background:var(--membrane);color:var(--mist)}
.zicon{width:56px;height:56px;display:grid;place-items:center;background:#120E2B;border-radius:12px;border:1px solid var(--membrane);font-size:1.6rem}

/* ---------- ห้องสอบ (ด่าน) ---------- */
.battle{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:14px 18px;background:linear-gradient(180deg,#241A4F,#160F35);border:1px solid var(--membrane);border-radius:var(--r);margin-bottom:16px;overflow:hidden;position:relative}
.battle::after{content:"";position:absolute;inset:0;background:radial-gradient(400px 120px at 78% 100%, rgba(255,93,143,.22), transparent 70%);pointer-events:none}
.hp{width:min(230px,44vw)}
.hp .lbl{font-family:var(--dsp);font-size:.9rem;display:flex;justify-content:space-between;align-items:baseline}
.hp .lbl span{font-family:var(--mono);font-size:.75rem;color:var(--mist)}
.bar{height:12px;background:#0B0820;border:1.5px solid var(--membrane);border-radius:20px;overflow:hidden;margin-top:5px}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--rose),#FF9F45);width:100%;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
.bar.xp > i{background:linear-gradient(90deg,var(--jade),var(--cyan))}

.cols{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);gap:18px;align-items:start}
@media(max-width:880px){.cols{grid-template-columns:1fr}.eggs{grid-template-columns:1fr}}
.stim{position:sticky;top:64px}
.stim h3{color:var(--cyan);font-size:1.1rem;margin-bottom:10px}
.stim .card{border-left:4px solid var(--cyan)}
.stim p{margin:0 0 10px}
.stim ul,.stim ol{margin:0 0 10px 20px}
.stim li{margin-bottom:4px}
.note{background:#120E2B;border:1px dashed var(--membrane);border-radius:10px;padding:10px 12px;font-size:.9rem;color:var(--mist);margin-top:10px}
.note b{color:var(--yolk)}

table.data{width:100%;border-collapse:collapse;margin:10px 0;font-size:.92rem;font-family:var(--mono)}
table.data th,table.data td{border:1px solid var(--membrane);padding:7px 9px;text-align:center}
table.data th{background:#120E2B;color:var(--cyan);font-weight:600;font-size:.85rem}
table.data td.l,table.data th.l{text-align:left;font-family:var(--body)}
table.punnett{border-collapse:collapse;margin:10px auto;font-family:var(--mono);font-weight:600}
table.punnett td,table.punnett th{border:2px solid var(--membrane);width:54px;height:44px;text-align:center}
table.punnett th{background:#120E2B;color:var(--yolk)}

.q{margin-bottom:18px}
.qhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.qno{font-family:var(--mono);font-size:.78rem;color:var(--void);background:var(--yolk);padding:2px 9px;border-radius:20px;font-weight:600}
.qpt{font-family:var(--mono);font-size:.78rem;color:var(--jade)}
.q p.prompt{font-size:1.03rem;margin-bottom:10px}
textarea.ans{
  width:100%;min-height:132px;resize:vertical;background:#120E2B;color:var(--ink);
  border:1.5px solid var(--membrane);border-radius:12px;padding:13px 15px;line-height:1.85;font-size:1.02rem;
}
textarea.ans:focus{border-color:var(--yolk);outline:none;background:#150F33}
.meter{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.76rem;color:var(--mist);margin-top:5px}
.meter .low{color:var(--rose)}
.meter .ok{color:var(--jade)}
.coach{background:rgba(90,216,255,.08);border:1px solid rgba(90,216,255,.35);border-radius:10px;padding:10px 12px;margin-top:9px;font-size:.9rem;color:#CFEFFF}
.coach b{color:var(--cyan)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
.saved{font-family:var(--mono);font-size:.78rem;color:var(--jade);opacity:0;transition:opacity .3s}
.saved.on{opacity:1}

/* ---------- ผลลัพธ์ ---------- */
.score-big{font-family:var(--dsp);font-weight:700;font-size:clamp(3.2rem,12vw,5.4rem);line-height:1;color:var(--yolk);text-shadow:0 0 32px rgba(255,194,75,.45)}
.score-big small{font-size:.32em;color:var(--mist);font-weight:500}
.rank{font-family:var(--dsp);font-size:1.3rem;margin-top:2px}
.zscore{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px dashed var(--membrane)}
.zscore:last-child{border-bottom:0}
.medal{width:34px;height:34px;display:grid;place-items:center;border-radius:9px;font-size:1.05rem;background:#120E2B;border:1px solid var(--membrane)}
.fb{margin-top:8px;font-size:.9rem}
.fb .hit{color:var(--jade)}
.fb .miss{color:var(--mist)}
.fb div{display:flex;gap:8px;align-items:flex-start;margin-bottom:3px}
.chip{display:inline-block;font-family:var(--mono);font-size:.72rem;padding:3px 9px;border-radius:20px;border:1px solid var(--membrane);color:var(--mist);margin:0 5px 5px 0}
.stars{display:flex;gap:6px}
.star{font-size:1.7rem;background:none;color:var(--membrane);padding:0;line-height:1}
.star.on{color:var(--yolk)}
.status{padding:11px 14px;border-radius:10px;font-size:.92rem;margin-top:12px}
.status.ok{background:rgba(75,224,168,.12);border:1px solid var(--jade);color:#BFF6E2}
.status.bad{background:rgba(255,93,143,.12);border:1px solid var(--rose);color:#FFD3E1}
.status.pend{background:rgba(255,194,75,.1);border:1px solid var(--yolk);color:#FFE8BC}
code.code{display:block;background:#0B0820;border:1px solid var(--membrane);border-radius:10px;padding:10px;font-family:var(--mono);font-size:.72rem;word-break:break-all;max-height:120px;overflow:auto;color:var(--mist);margin-top:8px}

/* ---------- ครู ---------- */
table.tt{width:100%;border-collapse:collapse;font-size:.86rem}
table.tt th,table.tt td{border:1px solid var(--membrane);padding:6px 8px;text-align:left;vertical-align:top}
table.tt th{background:#120E2B;color:var(--cyan);font-family:var(--dsp);font-weight:600;position:sticky;top:0}
table.tt td.n{font-family:var(--mono);text-align:center}
.scroll{overflow:auto;max-height:60vh;border:1px solid var(--membrane);border-radius:10px}
.tbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
details.key{border:1px solid var(--membrane);border-radius:10px;padding:10px 14px;margin-bottom:10px;background:var(--shell)}
details.key summary{cursor:pointer;font-family:var(--dsp);font-weight:600;color:var(--yolk)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--membrane);color:var(--ink);padding:11px 20px;border-radius:30px;z-index:80;box-shadow:var(--shadow);font-family:var(--dsp);font-size:.92rem}
.foot{text-align:center;color:var(--mist);font-size:.8rem;margin-top:26px}
.foot a{color:var(--mist)}
@media print{
  body{background:#fff;color:#000}
  .noprint{display:none!important}
  .card,details.key{border:1px solid #999;background:#fff;color:#000;box-shadow:none}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* =====================================================================
   GENOMON — ศึกนักเพาะพันธุ์แห่งยีน
   แบบทดสอบกลางภาค วิทยาศาสตร์ ม.3 : หน่วยพันธุศาสตร์ (20 คะแนน / 45 นาที)
   ออกแบบให้ ครูฉัตรวัฒก์ คำพวง
   ---------------------------------------------------------------------
   ★★★ ครูแก้ค่าได้ที่ CFG ด้านล่างนี้เท่านั้น ★★★
   ===================================================================== */
const CFG = {
  /* วาง URL ของ Google Apps Script Web App ตรงนี้ (ดูคู่มือครู ขั้นตอนที่ 2)
     ถ้าเว้นว่าง เกมยังเล่นได้ปกติ แต่จะเก็บคะแนนผ่าน "รหัสผลสอบ" แทน */
  GAS_URL: "https://script.google.com/macros/s/AKfycbyrIQ65iSrJSfqCTg31kKk3akMy5g-5AbbIonpGw8j9R2DXGaSoU0eSqnkbVPw0HwOiQg/exec",

  EXAM_MINUTES: 45,      // เวลาสอบทั้งหมด (นาที) เริ่มจับเมื่อกด "ออกเดินทาง"
  ZONE_MINUTES: 8,       // เวลาแนะนำต่อด่าน (นาที) — เตือนแบบนุ่มนวล ไม่บังคับ
  TOTAL_POINTS: 20,

  AUTO_SCORE: true,      // true = ตรวจอัตโนมัติแล้วแจ้งคะแนนทันที / false = ส่งคำตอบเฉย ๆ ให้ครูตรวจเอง
  REVEAL: "concepts",    // "concepts" = บอกว่าตอบครบประเด็นใดบ้าง | "score" = บอกแค่คะแนน | "none" = ไม่เปิดเผย
  HINTS: true,           // เปิดปุ่ม "โค้ช" (คำใบ้เชิงวิธีคิด ไม่ใช่เฉลย) — ระบบจะบันทึกว่าใครใช้กี่ครั้ง
  MIN_CHARS: 20,         // คำตอบสั้นกว่านี้จะไม่ได้คะแนนอัตโนมัติ

  TEACHER_PIN: "3103",   // รหัสเข้าหน้าครู (เปลี่ยนได้) เข้าโดยเติม ?teacher=1 ท้าย URL
  TEACHER_NAME: "ครูฉัตรวัฒก์ คำพวง",
  EXAM_TITLE: "สอบกลางภาค วิทยาศาสตร์ ม.3 · หน่วยพันธุศาสตร์",
  CLASSES: ["ม.3/1","ม.3/2","ม.3/3","ม.3/4","ม.3/5","ม.3/6","ม.3/7","ม.3/8"]
};

/* ---------------- สายพันธุ์เริ่มต้น 3 สาย × 3 ขั้นวิวัฒนาการ ---------------- */
const LINES = [
  { egg:"ไข่มรกต",  hue:"#4BE0A8", hue2:"#9BFFD0", type:"สายพฤกษ์",
    names:["เจอร์มิ","ฟลอราจีน","ไกอาจีน"],
    desc:"ฟักช้าแต่ทนทาน เหมาะกับนักคิดที่ค่อย ๆ ไตร่ตรอง" },
  { egg:"ไข่ทับทิม", hue:"#FF8A4B", hue2:"#FFC24B", type:"สายเพลิง",
    names:["พีโรจี","อิกนิจีน","โซลาจีน"],
    desc:"พลังโจมตีสูง เหมาะกับนักคิดที่กล้าตอบกล้าอธิบาย" },
  { egg:"ไข่ไพลิน", hue:"#5AD8FF", hue2:"#B6ECFF", type:"สายวารี",
    names:["อควาจี","ไฮโดรจีน","โอเชียจีน"],
    desc:"ยืดหยุ่นและช่างสังเกต เหมาะกับนักคิดที่อ่านข้อมูลละเอียด" }
];

  { code:"B", title:"ธาลัสซีเมีย: ภัยเงียบของไทย",
    stim:`<p>โรคธาลัสซีเมียเป็นโรคโลหิตจางที่ถ่ายทอดทางพันธุกรรม ควบคุมด้วย <b>ยีนด้อยบนออโตโซม</b></p>

  { code:"C", title:"การทดลองรังสีที่พังไม่เป็นท่า",
    stim:`<p>นักวิจัยฝึกหัดคนหนึ่งอยากรู้ว่า "รังสีทำให้เกิดการกลายพันธุ์จริงหรือไม่" จึงทำการทดลองดังนี้</p>

    stim:`<p><b>ข้าวสีทอง (Golden Rice)</b> คือข้าวที่ถูกดัดแปรพันธุกรรมโดยการใส่ยีนที่ควบคุมการสร้าง <b>เบต้าแคโรทีน</b> (สารตั้งต้นของวิตามินเอ) เข้าไปในเมล็ดข้าว ทำให้เมล็ดมีสีเหลืองทอง</p>

const $ = (s,r)=> (r||document).querySelector(s);
const app = $("#app");
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const pad = n => String(n).padStart(2,"0");
const mmss = s => pad(Math.floor(Math.max(0,s)/60))+":"+pad(Math.floor(Math.max(0,s)%60));
const uid = () => "g"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);

/* ---- ที่เก็บข้อมูลชั่วคราว: ใช้ localStorage ถ้าใช้ได้ ไม่งั้นเก็บในหน่วยความจำ ---- */
const MEM = {};
const store = {
  get(k){ try{ const v = window.localStorage.getItem(k); return v===null? (k in MEM ? MEM[k] : null) : v; }catch(e){ return k in MEM ? MEM[k] : null; } },
  set(k,v){ MEM[k]=v; try{ window.localStorage.setItem(k,v); }catch(e){} },
  del(k){ delete MEM[k]; try{ window.localStorage.removeItem(k); }catch(e){} }
};

/* ---- ตัวสุ่มแบบมีเมล็ด: นักเรียนคนเดิม = ชุดข้อสอบเดิมเสมอ ---- */
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function keyOf(st){ return [st.first,st.last,st.cls,st.no].map(x=>String(x||"").trim()).join("|"); }
function makePaper(st){
  const rnd = mulberry32(hashStr(keyOf(st)));
  return BANK.map(z => Math.floor(rnd()*z.variants.length));
}
function paperCode(paper){ return paper.map((v,i)=>BANK[i].variants[v].code).join("-"); }
function starterOf(st){ return Math.floor(mulberry32(hashStr("egg:"+keyOf(st)))()*3); }

/* ---- ตรวจคำตอบอัตนัยด้วยเกณฑ์เชิงมโนทัศน์ (rubric) ---- */
const THDIG = {"๐":"0","๑":"1","๒":"2","๓":"3","๔":"4","๕":"5","๖":"6","๗":"7","๘":"8","๙":"9"};
function normBase(s){
  return String(s||"")
    .replace(/[๐-๙]/g, c=>THDIG[c])
    .replace(/[\s\u200b\u00a0]+/g,"")
    .replace(/[.,!?;"'`“”‘’()\[\]]/g,"")
    .replace(/ๆ/g,"");
}
const normLC = s => normBase(s).toLowerCase();
function groupHit(hay, group){ return group.every(tok => hay.indexOf(tok)>=0); }
function conceptHit(lc, cs, c){
  if(c.need && c.need.some(g=>groupHit(lc,g.map(t=>t.toLowerCase())))) return true;
  if(c.needCS && c.needCS.some(g=>groupHit(cs,g))) return true;
  return false;
}
function scoreOne(text, q){
  const lc = normLC(text), cs = normBase(text);
  const raw = String(text||"").trim();
  if(raw.length < CFG.MIN_CHARS) return { s:0, hits:[], short:true, len:raw.length };
  let s=0; const hits=[];
  q.rub.forEach((c,i)=>{ if(conceptHit(lc,cs,c)){ hits.push(i); s+=c.pt; } });
  return { s: Math.min(s,2), hits, short:false, len:raw.length };
}

/* ---- คำนวณคะแนน ---- */
function grade(){
  const zones = BANK.map((z,zi)=>{
    const v = z.variants[S.paper[zi]];
    const qs = v.qs.map((q,qi)=>{
      const key = "z"+zi+"q"+qi;
      const text = (S.ans[key]||"");
      const r = CFG.AUTO_SCORE ? scoreOne(text,q) : {s:0,hits:[],short:false,len:text.trim().length};
      return { key, qi, text, score:r.s, hits:r.hits, len:r.len, short:r.short,
               review: (r.s<2 && r.len>=70) || (r.s===2 && r.len<45),
               pasted: !!S.pasted[key] };
    });
    const sc = qs.reduce((a,b)=>a+b.score,0);
    return { zi, zone:z.name, boss:z.boss, variant:v.code, title:v.title, score:sc, max:4,
             sec:S.ztime[zi]||0, hints:(S.hints["z"+zi+"q0"]?1:0)+(S.hints["z"+zi+"q1"]?1:0), qs };
  });
  const total = zones.reduce((a,b)=>a+b.score,0);
  const pct = Math.round(total/CFG.TOTAL_POINTS*100);
  let rank="นักเพาะพันธุ์ฝึกหัด", stage=1, medal="🥉";
  if(total>=17){ rank="ปรมาจารย์แห่งยีน"; stage=3; medal="👑"; }
  else if(total>=13){ rank="นักเพาะพันธุ์ระดับทอง"; stage=3; medal="🥇"; }
  else if(total>=9){ rank="นักเพาะพันธุ์ระดับเงิน"; stage=2; medal="🥈"; }
  else if(total>=5){ rank="นักเพาะพันธุ์ระดับทองแดง"; stage=2; medal="🥉"; }
  return { zones, total, pct, rank, stage, medal };
}
function medalOf(s){ return s===4?"🥇": s===3?"🥈": s===2?"🥉":"⬜"; }

    hints:g.zones.reduce((a,b)=>a+b.hints,0), blur:S.blur,
    pastes:g.zones.reduce((a,z)=>a+z.qs.filter(q=>q.pasted).length,0),

  };
  g.zones.forEach((z,i)=> z.qs.forEach((q,j)=>{
    rec["a"+(i+1)+"_"+(j+1)] = q.text;

function shortCode(){
  const g=S.result;
  const o={n:S.st.first+" "+S.st.last,c:S.st.cls,no:S.st.no,p:S.code,
           s:g.zones.map(z=>z.score),t:g.total,cm:(S.comment||"").slice(0,120)};
  return b64(JSON.stringify(o));
}
function b64(s){ return btoa(unescape(encodeURIComponent(s))); }
function unb64(s){ return decodeURIComponent(escape(atob(s.trim()))); }

/* ---- ส่งข้อมูลขึ้น Google Sheets (พยายาม 3 วิธี) ---- */
async function sendToSheet(rec){
  if(!CFG.GAS_URL) return {ok:false, why:"nourl"};
  const body = JSON.stringify(rec);
  for(let i=0;i<3;i++){
    try{
      const r = await fetch(CFG.GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body,redirect:"follow"});
      if(r.ok) return {ok:true};
    }catch(e){}
    try{
      await fetch(CFG.GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body});
      return {ok:true, opaque:true};
    }catch(e){}
    await sleep(900*(i+1));
  }
  try{
    if(navigator.sendBeacon && navigator.sendBeacon(CFG.GAS_URL, new Blob([body],{type:"text/plain;charset=utf-8"}))) return {ok:true,beacon:true};
  }catch(e){}
  return {ok:false, why:"net"};
}

/* ---- ดาวน์โหลดไฟล์ ---- */
function download(name, text, mime){
  const blob = new Blob(["\ufeff"+text],{type:(mime||"text/plain")+";charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}

function startClock(){
  if(TICK) clearInterval(TICK);
  TICK = setInterval(()=>{
    if(!S || S.submitted || !S.deadline) return;
    const left = Math.round((S.deadline-Date.now())/1000);
    const el = $("#clock");
    if(el){
      el.textContent = mmss(left);
      el.className = "timer" + (left<=60?" crit": left<=300?" warn":"");
    }
    if(left<=0){ S.timedOut=true; finishExam(true); }
  },1000);
}
function left(){ return S && S.deadline ? Math.round((S.deadline-Date.now())/1000) : CFG.EXAM_MINUTES*60; }

  if(S && S.startAt && !S.submitted){ save(); e.preventDefault(); e.returnValue=""; }
});

});

function confirmFinish(){
  const blank = [];
  BANK.forEach((z,zi)=> z.variants[S.paper[zi]].qs.forEach((q,qi)=>{
    if(!(S.ans["z"+zi+"q"+qi]||"").trim()) blank.push("ด่าน "+(zi+1)+" ข้อ "+(qi+1));
  }));
  const msg = blank.length
    ? "ยังไม่ได้ตอบ "+blank.length+" ข้อ ("+blank.join(", ")+")\nข้อที่ไม่ตอบจะได้ 0 คะแนน\n\nยืนยันส่งคำตอบเลยหรือไม่? (ส่งแล้วแก้ไม่ได้)"
    : "ตอบครบทุกข้อแล้ว\n\nยืนยันส่งคำตอบ? (ส่งแล้วแก้ไม่ได้)";
  if(confirm(msg)) finishExam(false);
}

async function finishExam(auto){
  if(S.submitted) return;
  leaveZone();
  S.submitted = true;
  if(auto) S.timedOut = true;
  if(TICK) clearInterval(TICK);
  S.result = grade();
  S.screen = "result";
  save();
  await showdown(auto);
  render();
  autoSend();
}

async function showdown(auto){
  const g=S.result, L=LINES[S.starter];
  app.innerHTML = `<div class="wrap narrow" style="text-align:center;padding-top:40px">
    <span class="eyebrow">${auto?"หมดเวลา — ศึกตัดสินเริ่มขึ้นทันที":"ศึกตัดสิน"}</span>
    <h2 style="margin-bottom:14px">พลังที่เธอสะสมมาทั้ง 5 ด่าน กำลังปลดปล่อย</h2>
    <div id="bossbox">${bossSVG(4,130)}</div>
    <div class="bar" style="max-width:340px;margin:14px auto"><i id="bhp" style="width:100%"></i></div>
    <div class="mono muted" id="hptxt">HP 100%</div>
    <div id="hits" style="margin-top:18px;min-height:150px"></div>
    <div style="margin-top:10px">${creatureSVG(S.starter,g.stage,90)}</div>
  </div>`;
  await sleep(700);
  let hp=100;
  for(let i=0;i<5;i++){
    const z=g.zones[i];
    hp -= z.score/CFG.TOTAL_POINTS*100;
    const bb=$("#bossbox"); if(bb){ bb.style.transform="translateX(6px)"; setTimeout(()=>{ if(bb) bb.style.transform="translateX(0)"; },130); }
    const b=$("#bhp"); if(b) b.style.width=Math.max(0,hp)+"%";
    const t=$("#hptxt"); if(t) t.textContent="HP "+Math.max(0,Math.round(hp))+"%";
    const h=$("#hits");
    if(h) h.insertAdjacentHTML("beforeend",
      `<div class="pop" style="font-family:var(--mono);font-size:1rem;margin-bottom:4px">
        ด่าน ${i+1} ${BANK[i].icon} → <b style="color:${z.score>=3?"#4BE0A8":z.score>=2?"#FFC24B":"#FF5D8F"}">${z.score}/4</b> ${medalOf(z.score)}</div>`);
    await sleep(750);
  }
  await sleep(600);
}

function paintStatus(){

    idle: CFG.GAS_URL? `<div class="status pend">กำลังเตรียมส่งข้อมูล...</div>`
                     : `<div class="status pend"><b>ครูยังไม่ได้ตั้งค่าการส่งข้อมูลอัตโนมัติ</b> — ให้ส่งคะแนนด้วยวิธีที่ครูกำหนด (ดูแผนสำรองด้านล่าง)</div>`,
    sending: `<div class="status pend">⏳ กำลังส่งข้อมูลให้ครู...</div>`,
    ok: `<div class="status ok">✅ <b>ส่งสำเร็จ!</b> คะแนนและข้อคิดเห็นของเธอถึงมือ ${esc(CFG.TEACHER_NAME)} เรียบร้อยแล้ว<br>ถ้าแก้ข้อคิดเห็นเพิ่ม กด "ส่ง" อีกครั้งได้ ระบบจะอัปเดตทับของเดิม</div>`,
    fail: `<div class="status bad">⚠️ ส่งไม่สำเร็จ (เน็ตอาจมีปัญหา) — <button class="btn sm" id="retry">ลองส่งอีกครั้ง</button><br>ถ้ายังไม่ได้ ให้ใช้แผนสำรองด้านล่างแล้วแจ้งครู</div>`
  }[S.sent] || "";
  el.innerHTML=m;
  const r=$("#retry"); if(r) r.onclick=()=>autoSend(true);
}
async function autoSend(manual){
  if(!CFG.GAS_URL){ S.sent="idle"; paintStatus(); if(manual) toast("ครูยังไม่ได้เปิดระบบส่งอัตโนมัติ — ใช้แผนสำรองด้านล่าง"); return; }
  S.sent="sending"; paintStatus();
  const r = await sendToSheet(buildRecord());
  S.sent = r.ok? "ok":"fail"; save(); paintStatus();
  if(manual) toast(r.ok? "ส่งให้ครูเรียบร้อย":"ส่งไม่สำเร็จ ลองใหม่อีกครั้ง");
}

      <span class="eyebrow">วิธีที่ 1 — ดูคะแนนจาก Google Sheets (แนะนำ)</span>
      <p style="font-size:.95rem">${CFG.GAS_URL
        ? `ระบบส่งข้อมูลอัตโนมัติ <b style="color:var(--jade)">เปิดใช้งานแล้ว</b> — คะแนนของนักเรียนทุกคนจะไหลเข้าชีตทันทีที่กดส่ง เปิด Google Sheet ของครูได้เลย`
        : `<b style="color:var(--rose)">ยังไม่ได้ตั้งค่า</b> — เปิดไฟล์ .html ด้วย Text Editor แล้ววาง URL ของ Apps Script Web App ลงใน <span class="mono">CFG.GAS_URL</span> (ดูคู่มือครู)`}</p>
    </div>

    <div class="card" style="margin-top:14px">
      <span class="eyebrow">วิธีที่ 2 — รวมคะแนนจากรหัส/ไฟล์ผลสอบ (ใช้ตอนเน็ตล่ม)</span>
      <p class="muted" style="font-size:.9rem;margin-bottom:8px">วางรหัสผลสอบของนักเรียน บรรทัดละ 1 คน หรือเลือกไฟล์ .json ที่นักเรียนดาวน์โหลดมาส่ง</p>
      <div class="field"><textarea id="codes" rows="4" placeholder="วางรหัสผลสอบที่นี่ บรรทัดละ 1 คน"></textarea></div>
      <div class="tbar">
        <button class="btn sm" id="dec">รวมคะแนน</button>
        <label class="btn ghost sm" style="display:inline-flex">📁 เลือกไฟล์ .json<input type="file" id="fi" accept=".json" multiple hidden></label>
        <button class="btn ghost sm" id="csv">⬇ ดาวน์โหลด CSV (เปิดใน Excel)</button>
        <button class="btn ghost sm" id="clr">ล้างตาราง</button>
      </div>
      <div id="tbl"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <span class="eyebrow">เฉลย เกณฑ์การให้คะแนน และคลังข้อสอบทั้งหมด</span>
      <p class="muted" style="font-size:.9rem;margin-bottom:10px">15 สถานการณ์ (5 ด่าน × 3 ชุด) · 30 คำถาม · ใช้เป็นเกณฑ์ตรวจซ้ำด้วยมือ</p>
      <button class="btn sm" id="pk">🖨 พิมพ์เฉลยทั้งชุด</button>
      <div id="key" style="margin-top:14px"></div>
    </div>
    <div class="foot noprint"><a href="?">← กลับหน้าเกม</a></div>
  </div>`;

  $("#dec").onclick=()=>{
    const lines=$("#codes").value.split("\n").map(x=>x.trim()).filter(Boolean);
    let bad=0;
    lines.forEach(l=>{ try{ addRow(JSON.parse(unb64(l))); }catch(e){ bad++; } });
    drawTable(); if(bad) toast("อ่านไม่ได้ "+bad+" บรรทัด");
  };
  $("#fi").onchange=(e)=>{
    const fs=[...e.target.files];
    let n=0;
    fs.forEach(f=>{ const rd=new FileReader(); rd.onload=()=>{ try{ addRow(JSON.parse(rd.result)); n++; }catch(x){} if(++cnt===fs.length){ drawTable(); toast("นำเข้า "+n+" ไฟล์"); } }; rd.readAsText(f); });
    let cnt=0;
  };
  $("#csv").onclick=()=>{
    if(!TROWS.length){ toast("ยังไม่มีข้อมูลในตาราง"); return; }
    const H=["ชื่อ","สกุล","ชั้น","เลขที่","ชุดข้อสอบ","ด่าน1","ด่าน2","ด่าน3","ด่าน4","ด่าน5","รวม20","ร้อยละ","ข้อคิดเห็น"];
    const q=v=>'"'+String(v==null?"":v).replace(/"/g,'""')+'"';
    const rows=TROWS.map(r=>[r.first,r.last,r.cls,r.no,r.paper,r.z1,r.z2,r.z3,r.z4,r.z5,r.total,r.pct,r.comment].map(q).join(","));
    download("GENOMON_คะแนน.csv",[H.map(q).join(",")].concat(rows).join("\n"),"text/csv");
  };
  $("#clr").onclick=()=>{ TROWS=[]; drawTable(); };
  $("#pk").onclick=()=> window.print();
  drawTable(); drawKey();
}
function addRow(o){
  const r = o.s ? { first:(o.n||"").split(" ")[0]||"", last:(o.n||"").split(" ").slice(1).join(" "), cls:o.c, no:o.no,
                    paper:o.p, z1:o.s[0],z2:o.s[1],z3:o.s[2],z4:o.s[3],z5:o.s[4], total:o.t,
                    pct:Math.round(o.t/CFG.TOTAL_POINTS*100), comment:o.cm||"", full:null }
                : { first:o.first,last:o.last,cls:o.cls,no:o.no,paper:o.paper,z1:o.z1,z2:o.z2,z3:o.z3,z4:o.z4,z5:o.z5,
                    total:o.total,pct:o.pct,comment:o.comment||"", full:o };
  const i = TROWS.findIndex(x=>x.cls===r.cls && String(x.no)===String(r.no));
  if(i>=0) TROWS[i]=r; else TROWS.push(r);
}
function drawTable(){
  const el=$("#tbl"); if(!el) return;
  if(!TROWS.length){ el.innerHTML=`<p class="muted" style="font-size:.9rem">ยังไม่มีข้อมูล</p>`; return; }
  TROWS.sort((a,b)=> (a.cls||"").localeCompare(b.cls||"") || (+a.no)-(+b.no));
  const avg=(TROWS.reduce((a,b)=>a+(+b.total||0),0)/TROWS.length).toFixed(2);
  const zavg=[1,2,3,4,5].map(i=>(TROWS.reduce((a,b)=>a+(+b["z"+i]||0),0)/TROWS.length).toFixed(2));
  el.innerHTML = `<p class="mono" style="font-size:.82rem;color:var(--jade);margin:10px 0">
      ${TROWS.length} คน · เฉลี่ยรวม ${avg}/20 · เฉลี่ยรายด่าน ${zavg.map((v,i)=>"ด่าน"+(i+1)+":"+v).join(" · ")}</p>
    <div class="scroll"><table class="tt"><tr>
      <th>ชั้น</th><th>เลขที่</th><th>ชื่อ-สกุล</th><th>ชุด</th>
      <th>ด1</th><th>ด2</th><th>ด3</th><th>ด4</th><th>ด5</th><th>รวม</th><th>ข้อคิดเห็น</th></tr>
      ${TROWS.map(r=>`<tr>
        <td class="n">${esc(r.cls)}</td><td class="n">${esc(r.no)}</td>
        <td>${esc(r.first)} ${esc(r.last)}</td><td class="n">${esc(r.paper)}</td>
        <td class="n">${r.z1}</td><td class="n">${r.z2}</td><td class="n">${r.z3}</td><td class="n">${r.z4}</td><td class="n">${r.z5}</td>
        <td class="n" style="color:var(--yolk);font-weight:600">${r.total}</td>
        <td style="max-width:240px">${esc(r.comment)}</td></tr>`).join("")}
    </table></div>`;
}
function drawKey(){
  const el=$("#key"); if(!el) return;
  el.innerHTML = BANK.map((z,zi)=>`<details class="key"><summary>ด่าน ${zi+1} · ${z.name} (บอส ${z.boss})</summary>
    ${z.variants.map(v=>`<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--membrane)">
      <b style="color:var(--cyan)">ชุด ${v.code} — ${v.title}</b>
      ${v.qs.map((q,qi)=>`<div style="margin-top:8px">
        <div style="font-size:.92rem"><b>ข้อ ${qi+1} (2 คะแนน):</b> ${q.p}</div>
        <div style="font-size:.9rem;color:var(--jade);margin-top:4px"><b>แนวคำตอบ:</b> ${esc(q.model)}</div>
        <div style="font-size:.88rem;color:var(--mist);margin-top:4px"><b>เกณฑ์ (ได้ 2 ใน 3 ประเด็น = เต็ม):</b>
          <ol style="margin-left:18px">${q.rub.map(c=>`<li>${esc(c.d)}</li>`).join("")}</ol></div>
      </div>`).join("")}</div>`).join("")}
  </details>`).join("");
}

/* =====================================================================
   ROUTER
   ===================================================================== */
function render(){
  window.scrollTo(0,0);
  if(!S){ screenRegister(); return; }
  if(S.screen==="egg") return screenEgg();
  if(S.screen==="zone") return screenZone();
  if(S.screen==="result") return screenResult();
  return screenMap();
}
(function boot(){
  if(/[?&]teacher=1/.test(location.search)){ screenTeacher(); return; }
  const prev=load();
  if(prev && prev.submitted && prev.result){ S=prev; render(); return; }
  render();
})();
</script>
